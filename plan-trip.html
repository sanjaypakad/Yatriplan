<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan a Trip - Yatriplan</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>

    <!-- Navigation Bar -->
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="destinations.html">Destinations</a></li>
                <li><a href="plan-trip.html">Plan a Trip</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </header>

    <!-- Trip Planner Form -->
    <section id="trip-planner">
        <h2>Plan Your Trip</h2>
        <form id="planner-form">
            <label for="destination">Choose a destination:</label>
            <select id="destination">
                <option value="Rajasthan">Rajasthan</option>
                <option value="Goa">Goa</option>
                <option value="Kerala">Kerala</option>
            </select>

            <label for="activities">Choose activities:</label>
            <select id="activities" multiple>
                <option value="Beach">Beach</option>
                <option value="Mountain Hiking">Mountain Hiking</option>
                <option value="Cultural Tour">Cultural Tour</option>
            </select>

            <label for="date">Choose trip dates:</label>
            <input type="date" id="date">

            <button type="submit">Plan Trip</button>
        </form>
    </section>

    <script src="assets/script.js"></script>
</body>
</html>
